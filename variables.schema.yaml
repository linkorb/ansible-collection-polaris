type: object
description: JSONSchema for collection variables
additionalProperties: false
required:
  - docker_registry_username
  - docker_registry_pat
  - tailscale_authkey
  - shipyard_charts_path
  - shipyard_stacks_path

properties:
  admins_active:
    type: array
    description: List of admin users to create or update
    default: []
    items:
      type: object
      additionalProperties: false
      required: ['username','fullname']
      properties:
        username:
          type: string
        fullname:
          type: string
        pubkey:
          type: string
          description: >
            The public key to associate with the given user. This value can be a string containing the content of
            the user's public key, a string containing a URL to a list of keys (e.g https://github.com/username.keys),
            or a list of multiple strings containing either public key content or URLs

  admins_removed:
    type: array
    description: List of usernames to remove
    default: []
    items:
      type: string


  docker_users:
    type: array
    description: List of sudo-less docker users
    default: []
    items:
      type: string

  docker_registry_username:
    type: string

  docker_registry_pat:
    type: string

  docker_registry:
    type: string
    default: https://ghcr.io/


  tailscale_authkey:
    type: string
    description: A Tailscale Node Authorization auth key.

  tailscale_args:
    type: string
    description: >
      Pass any additional command-line arguments to tailscale up.
      Only tailscale up arguments can be passed in.
      

  traefik_tls_files:
    type: array
    description: SOPS encrypted certificate and keyfile to inject into traefik for TLS offloading
    default: []
    items:
      type: object
      additionalProperties: false
      required: ['certFile', 'keyFile', 'domain']
      properties:
        certFile:
          type: string
          description: SOPS encrypted certificate file
        keyFile:
          description: SOPS encrypted key file
          type: string
        domain:
          type: string
          description: >
            Domain name of the given certificate/key pair, for documentation and generation of filename on deployment
            host. You can set subject alternative names in your services using traefik labels.
            "traefik.http.routers.{{ Stack.name }}.tls.domains.sans=...,..."

  traefik_log_level:
    type: string
    description: Traefik configured log level, verbosity (default ERROR)
    default: ERROR
    enum:
      - DEBUG
      - INFO
      - WARN
      - ERROR
      - FATAL
      - PANIC


  shipyard_charts_path:
    type: string
    description: >
      Path to your project's shipyard charts. Among the charts defined, your project should have a chart for traefik,
      as the playbook depends on it for the docker swarm ingress/loadbalancer layer.

  shipyard_stacks_path:
    type: string
    description: >
      Path to your project's shipyard stacks directory. This directory can contain overrides for the default values of
      a specific chart, in either plaintext or SOPS encrypted variables.
